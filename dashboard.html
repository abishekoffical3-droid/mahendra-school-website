<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Admin Dashboard</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jisoljwfzmamblbccemr.supabase.co",
  "sb_publishable__Iss5xP0CG2DyJ0PmrwKvg__Prj5Kec"
);

window.addNotice = async function () {

  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;

  if (!title || !description) {
    alert("Please fill all fields.");
    return;
  }

  const { error } = await supabase
    .from("notices")
    .insert([
      {
        title,
        description
      }
    ]);

  if (error) {
    alert("❌ " + error.message);
  } else {
    alert("✅ Notice Added Successfully");

    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
  }

}
</script>

<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#0d6efd;
color:white;
padding:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 10px #ccc;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:12px;
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h2>🎓 Shree Mahendra Secondary School Admin Dashboard</h2>
</header>

<div class="container">

<div class="card">

<h3>Add Notice</h3>

<input id="title" placeholder="Notice Title">

<textarea id="description" placeholder="Notice Description"></textarea>

<button onclick="addNotice()">Add Notice</button>

</div>

</div>

</body>
</html>
