<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Admin Dashboard</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f6f9;
}
header{
    background:#0d6efd;
    color:white;
    padding:15px;
}
.container{
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}
input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    border-radius:5px;
}
button:hover{
    background:#084298;
}
</style>

</head>
<body>

<header>
<h2>🎓 Shree Mahendra Secondary School - Admin Dashboard</h2>
</header>

<div class="container">

<div class="card">
<h3>Add Notice</h3>

<input id="title" placeholder="Notice Title">

<textarea id="description" placeholder="Notice Description"></textarea>

<button>Add Notice</button>

</div>

</div>

</body>
</html>
