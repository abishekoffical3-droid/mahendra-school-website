<!DOCTYPE html>
<html>
<head>
<title>School Admin Login</title>
</head>

<body>

<h1>Shree Mahendra School Admin</h1>

<input id="email" placeholder="Email">
<br><br>

<input id="password" type="password" placeholder="Password">
<br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>


<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";


const supabase = createClient(
"https://jisoljwfzmamblbccemr.supabase.co",
"sb_publishable__Iss5xP0CG2DyJ0PmrwKvg__Prj5Kec"
);


window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;


const {data,error} = await supabase.auth.signInWithPassword({
email,
password
});


if(error){
document.getElementById("msg").innerHTML="Login Failed";
}
else{
document.getElementById("msg").innerHTML="Login Successful";
}

}

</script>

</body>
</html>
